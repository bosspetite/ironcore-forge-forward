<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IronCore Fitness – Push Your Limits. Transform Your Body.</title>
    <script>
      (function () {
        var repoBase = "/ironcore-forge-forward";
        var locationPath = window.location.pathname;
        var search = window.location.search || "";
        var hash = window.location.hash || "";

        if (!locationPath.startsWith(repoBase)) {
          window.location.replace(window.location.origin + repoBase + "/" + search + hash);
          return;
        }

        var routePath = locationPath.slice(repoBase.length);

        if (!routePath || routePath === "/404.html") {
          routePath = "/";
        }

        var target =
          window.location.origin +
          repoBase +
          "/?p=" +
          encodeURIComponent(routePath + search + hash);

        window.location.replace(target);
      })();
    </script>
  </head>
  <body>
    <div
      style="
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        font-family: Arial, sans-serif;
      "
    >
      <p>Redirecting...</p>
    </div>
  </body>
</html>
